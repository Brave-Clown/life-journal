version: '3.8'

services:
  life-journal:
    build: .
    container_name: life-journal
    ports:
      - "49182:49182"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=49182
      # Set a password to protect your journal (recommended if exposed to network)
      # - JOURNAL_PASSWORD=your-secret-password-here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:49182/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
