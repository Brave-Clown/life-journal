<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Journal</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #181a24;
      --bg-card: #1e2030;
      --bg-input: #262838;
      --border-subtle: #2a2d3e;
      --border-focus: #5b8af5;
      --text-primary: #e2e4ed;
      --text-secondary: #8b8fa3;
      --text-muted: #5c6078;
      --accent-blue: #5b8af5;
      --accent-purple: #a78bfa;
      --accent-green: #6ee7a0;
      --accent-red: #f87171;
      --accent-pink: #f472b6;
      --accent-yellow: #fbbf24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    textarea, input, select, button { font-family: inherit; }
    textarea {
      white-space: pre-wrap !important;
      word-wrap: break-word !important;
      overflow-wrap: break-word !important;
    }
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    /* Date input styling */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── Storage API wrapper ───
    window.storage = {
      async list(prefix) {
        const params = prefix ? `?prefix=${encodeURIComponent(prefix)}` : '';
        const res = await fetch(`/api/storage/list${params}`);
        if (!res.ok) throw new Error(`Failed to list (${res.status})`);
        return await res.json();
      },
      async get(key) {
        const res = await fetch(`/api/storage/get/${encodeURIComponent(key)}`);
        if (!res.ok) throw new Error(`Failed to get (${res.status})`);
        return await res.json();
      },
      async set(key, value) {
        const res = await fetch('/api/storage/set', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, value })
        });
        if (!res.ok) throw new Error(`Failed to set (${res.status})`);
        return await res.json();
      },
      async delete(key) {
        const res = await fetch(`/api/storage/delete/${encodeURIComponent(key)}`, {
          method: 'DELETE'
        });
        if (!res.ok) throw new Error(`Failed to delete (${res.status})`);
        return await res.json();
      }
    };

    // ─── SVG Icon components ───
    const Icon = ({ d, size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p}/>) : <path d={d}/>}
      </svg>
    );
    const SaveIcon = ({ size }) => <Icon size={size} d={["M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z","M17 21v-8H7v8","M7 3v5h8"]} />;
    const MenuIcon = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
    const XIcon = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const ChevLeft = ({ size }) => <Icon size={size} d="M15 18l-6-6 6-6" />;
    const ChevRight = ({ size }) => <Icon size={size} d="M9 18l6-6-6-6" />;
    const DownloadIcon = ({ size }) => <Icon size={size} d={["M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4","M7 10l5 5 5-5","M12 15V3"]} />;
    const TrashIcon = ({ size }) => <Icon size={size} d={["M3 6h18","M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6","M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"]} />;
    const GearIcon = ({ size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>;

    // ─── Helper: escape HTML for safe PDF export ───
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ─── Default field configuration ───
    // These are example fields — customize them in Settings to match your life!
    const DEFAULT_FIELDS = [
      { id: 'weight', label: 'Weight', rows: 1, section: 'personal' },
      { id: 'health', label: 'Health', rows: 1, section: 'personal' },
      { id: 'exercise', label: 'Exercise', rows: 1, section: 'personal' },
      { id: 'sleep', label: 'Sleep', rows: 1, section: 'personal' },
      { id: 'food', label: 'Food', rows: 1, section: 'personal' },
      { id: 'housework', label: 'Housework/Chores', rows: 1, section: 'personal' },
      { id: 'books', label: 'Books', rows: 1, section: 'personal' },
      { id: 'movies', label: 'Movies', rows: 1, section: 'personal' },
      { id: 'shows', label: 'Shows', rows: 1, section: 'personal' },
      { id: 'music', label: 'Music', rows: 1, section: 'personal' },
      { id: 'purchases', label: 'Purchases', rows: 1, section: 'personal' },
      { id: 'person1', label: 'Person 1', rows: 2, section: 'people' },
      { id: 'person2', label: 'Person 2', rows: 2, section: 'people' },
      { id: 'person3', label: 'Person 3', rows: 2, section: 'people' },
      { id: 'familyNotes', label: 'Family', rows: 2, section: 'people' },
      { id: 'friendNotes', label: 'Friends', rows: 2, section: 'people' },
      { id: 'work', label: 'Work', rows: 3, section: 'reflections' },
      { id: 'news', label: 'News', rows: 3, section: 'reflections' },
      { id: 'financial', label: 'Financial', rows: 3, section: 'reflections' },
      { id: 'goals', label: 'Goals / Progress', rows: 3, section: 'reflections' },
      { id: 'miscThoughts', label: 'Misc Thoughts or Feelings', rows: 4, section: 'reflections' }
    ];

    const DEFAULT_SECTIONS = [
      { id: 'personal', label: 'Personal Metrics', color: 'blue' },
      { id: 'people', label: 'People', color: 'purple' },
      { id: 'reflections', label: 'Reflections & Thoughts', color: 'green' }
    ];

    const SECTION_COLORS = {
      blue: { heading: '#5b8af5', border: '#2a3a6e' },
      purple: { heading: '#a78bfa', border: '#3d2a6e' },
      green: { heading: '#6ee7a0', border: '#1a4a32' },
      yellow: { heading: '#fbbf24', border: '#4a3a1a' },
      red: { heading: '#f87171', border: '#4a1a1a' },
      pink: { heading: '#f472b6', border: '#4a1a3a' }
    };

    // ═══════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════
    function LifeJournal() {
      const [currentDate, setCurrentDate] = useState(new Date().toISOString().split('T')[0]);
      const [entries, setEntries] = useState({});
      const [showSidebar, setShowSidebar] = useState(false);
      const [savedDates, setSavedDates] = useState([]);
      const [saveStatus, setSaveStatus] = useState('');
      const [selectedYear, setSelectedYear] = useState(new Date().getFullYear().toString());
      const [sortOrder, setSortOrder] = useState('desc');
      const [showSettings, setShowSettings] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(false);
      const [showExportModal, setShowExportModal] = useState(false);
      const [showMobileActions, setShowMobileActions] = useState(false);
      const [settings, setSettings] = useState({ openToYesterday: false });
      const [fieldConfig, setFieldConfig] = useState(DEFAULT_FIELDS);
      const [sections, setSections] = useState(DEFAULT_SECTIONS);
      const [editingField, setEditingField] = useState(null);
      const [newFieldName, setNewFieldName] = useState('');
      const [newFieldRows, setNewFieldRows] = useState(1);
      const [newFieldSection, setNewFieldSection] = useState('personal');
      const [newFieldSideBySide, setNewFieldSideBySide] = useState(false);
      const [newFieldParent, setNewFieldParent] = useState('');
      const [draggedField, setDraggedField] = useState(null);
      const [newSectionName, setNewSectionName] = useState('');
      const [newSectionColor, setNewSectionColor] = useState('blue');
      const [isLoading, setIsLoading] = useState(true);

      // Refs for auto-save to avoid stale closures
      const entriesRef = useRef(entries);
      const currentDateRef = useRef(currentDate);
      const fieldConfigRef = useRef(fieldConfig);
      entriesRef.current = entries;
      currentDateRef.current = currentDate;
      fieldConfigRef.current = fieldConfig;

      // ─── Load entries (fetch list + all data) ───
      const loadAllEntries = useCallback(async () => {
        try {
          const result = await window.storage.list('journal:');
          if (result && result.keys) {
            const dates = result.keys
              .map(key => key.replace('journal:', ''))
              .sort()
              .reverse();
            setSavedDates(dates);

            // Fetch all entries in parallel instead of sequentially
            const fetches = dates.map(async (date) => {
              try {
                const entryResult = await window.storage.get(`journal:${date}`);
                return [date, JSON.parse(entryResult.value)];
              } catch {
                return null;
              }
            });

            const results = await Promise.all(fetches);
            const allEntries = {};
            for (const r of results) {
              if (r) allEntries[r[0]] = r[1];
            }
            setEntries(allEntries);
          }
        } catch (error) {
          console.log('No previous entries found');
        } finally {
          setIsLoading(false);
        }
      }, []);

      // Only update savedDates without re-fetching all entry content
      const refreshDateList = useCallback(async () => {
        try {
          const result = await window.storage.list('journal:');
          if (result && result.keys) {
            const dates = result.keys
              .map(key => key.replace('journal:', ''))
              .sort()
              .reverse();
            setSavedDates(dates);
          }
        } catch {}
      }, []);

      // ─── Load settings & field config from localStorage ───
      const loadSettings = useCallback(() => {
        try {
          const saved = localStorage.getItem('journal-settings');
          if (saved) setSettings(JSON.parse(saved));
        } catch {}
      }, []);

      const loadFieldConfig = useCallback(() => {
        try {
          const saved = localStorage.getItem('journal-field-config');
          if (saved) setFieldConfig(JSON.parse(saved));
          const savedSections = localStorage.getItem('journal-sections');
          if (savedSections) setSections(JSON.parse(savedSections));
        } catch {}
      }, []);

      // ─── Initial load ───
      useEffect(() => {
        loadAllEntries();
        loadSettings();
        loadFieldConfig();

        try {
          const savedSettings = localStorage.getItem('journal-settings');
          if (savedSettings) {
            const parsed = JSON.parse(savedSettings);
            if (parsed.openToYesterday) {
              const yesterday = new Date();
              yesterday.setDate(yesterday.getDate() - 1);
              setCurrentDate(yesterday.toISOString().split('T')[0]);
            }
          }
        } catch {}
      }, []);

      // ─── Auto-save every 30s (uses refs to avoid stale closures) ───
      useEffect(() => {
        const autoSaveInterval = setInterval(async () => {
          const date = currentDateRef.current;
          const allEntries = entriesRef.current;
          const config = fieldConfigRef.current;
          const currentEntryData = allEntries[date];
          const entry = currentEntryData?.data || currentEntryData;

          if (!entry || !date) return;
          const filledFields = Object.values(entry).filter(val => val && typeof val === 'string' && val.trim()).length;
          if (filledFields < 2) return;

          try {
            const entryWithConfig = {
              data: entry,
              fieldConfig: config,
              savedAt: new Date().toISOString()
            };
            await window.storage.set(`journal:${date}`, JSON.stringify(entryWithConfig));
            setSaveStatus('Auto-saved');
            setTimeout(() => setSaveStatus(''), 2000);
          } catch {}
        }, 30000);

        return () => clearInterval(autoSaveInterval);
      }, []); // Empty deps — uses refs

      // ─── Escape key handler ───
      useEffect(() => {
        const handleEscape = (e) => {
          if (e.key === 'Escape') {
            setShowSettings(false);
            setShowDeleteConfirm(false);
            setShowMobileActions(false);
            setShowExportModal(false);
          }
        };
        window.addEventListener('keydown', handleEscape);
        return () => window.removeEventListener('keydown', handleEscape);
      }, []);

      // ─── Auto-resize textareas when date/entries change ───
      useEffect(() => {
        const timer = setTimeout(() => {
          document.querySelectorAll('textarea').forEach(ta => {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
          });
        }, 50);
        return () => clearTimeout(timer);
      }, [currentDate, entries]);

      // ─── Settings persistence ───
      const saveSettings = (newSettings) => {
        localStorage.setItem('journal-settings', JSON.stringify(newSettings));
        setSettings(newSettings);
      };

      const saveFieldConfig = (newConfig) => {
        localStorage.setItem('journal-field-config', JSON.stringify(newConfig));
        setFieldConfig(newConfig);
      };

      const saveSections = (newSections) => {
        localStorage.setItem('journal-sections', JSON.stringify(newSections));
        setSections(newSections);
      };

      // ─── Entry field updates ───
      const updateField = useCallback((field, value) => {
        setEntries(prev => {
          const existingEntry = prev[currentDate] || {};
          const existingData = existingEntry.data || existingEntry;
          return {
            ...prev,
            [currentDate]: {
              ...existingEntry,
              data: { ...existingData, [field]: value }
            }
          };
        });
      }, [currentDate]);

      const handleTextareaInput = (e) => {
        e.target.style.height = 'auto';
        e.target.style.height = e.target.scrollHeight + 'px';
      };

      // ─── Field management ───
      const addNewField = () => {
        if (!newFieldName.trim()) return;
        const newField = {
          id: 'field_' + Date.now(),
          label: newFieldName.trim(),
          rows: newFieldRows,
          section: newFieldSection,
          sideBySide: newFieldSideBySide,
          parent: newFieldParent || undefined
        };
        saveFieldConfig([...fieldConfig, newField]);
        setNewFieldName('');
        setNewFieldRows(1);
        setNewFieldSideBySide(false);
        setNewFieldParent('');
      };

      const removeField = (fieldId) => {
        // Also remove any sub-fields
        saveFieldConfig(fieldConfig.filter(f => f.id !== fieldId && f.parent !== fieldId));
      };

      const saveFieldEdit = (fieldId, newLabel) => {
        if (!newLabel.trim()) return;
        saveFieldConfig(fieldConfig.map(f =>
          f.id === fieldId ? { ...f, label: newLabel.trim() } : f
        ));
        setEditingField(null);
      };

      const toggleSideBySide = (fieldId) => {
        const idx = fieldConfig.findIndex(f => f.id === fieldId);
        if (idx === -1) return;

        const field = fieldConfig[idx];
        const wantsSideBySide = !field.sideBySide;

        if (wantsSideBySide) {
          // Can't be side-by-side if it's the first field in its section
          const sectionFields = fieldConfig.filter(f => f.section === field.section && !f.parent);
          const posInSection = sectionFields.findIndex(f => f.id === fieldId);
          if (posInSection === 0) return;

          // Can't be side-by-side if the previous field in the section is also side-by-side
          const prevField = sectionFields[posInSection - 1];
          if (prevField?.sideBySide) return;
        }

        saveFieldConfig(fieldConfig.map(f =>
          f.id === fieldId ? { ...f, sideBySide: wantsSideBySide } : f
        ));
      };

      const updateFieldRows = (fieldId, newRows) => {
        saveFieldConfig(fieldConfig.map(f =>
          f.id === fieldId ? { ...f, rows: newRows } : f
        ));
      };

      // ─── Drag and drop ───
      const handleDragStart = (fieldId) => setDraggedField(fieldId);
      const handleDragOver = (e) => e.preventDefault();
      const handleDrop = (targetFieldId) => {
        if (!draggedField || draggedField === targetFieldId) return;
        const draggedIndex = fieldConfig.findIndex(f => f.id === draggedField);
        const targetIndex = fieldConfig.findIndex(f => f.id === targetFieldId);
        if (draggedIndex === -1 || targetIndex === -1) return;
        const updated = [...fieldConfig];
        const [removed] = updated.splice(draggedIndex, 1);
        updated.splice(targetIndex, 0, removed);
        saveFieldConfig(updated);
        setDraggedField(null);
      };

      // ─── Section management ───
      const addSection = () => {
        if (!newSectionName.trim()) return;
        saveSections([...sections, {
          id: 'section_' + Date.now(),
          label: newSectionName.trim(),
          color: newSectionColor
        }]);
        setNewSectionName('');
      };

      const removeSection = (sectionId) => {
        if (fieldConfig.some(f => f.section === sectionId)) {
          alert('Move or delete fields in this section first.');
          return;
        }
        saveSections(sections.filter(s => s.id !== sectionId));
      };

      // ─── Save entry ───
      const saveEntry = async (isAutoSave = false) => {
        const currentEntryData = entries[currentDate];
        const entry = currentEntryData?.data || currentEntryData;

        if (!entry || !currentDate) {
          if (!isAutoSave) {
            setSaveStatus('Enter a date and some content first');
            setTimeout(() => setSaveStatus(''), 3000);
          }
          return;
        }

        const hasContent = Object.values(entry).some(val => val && typeof val === 'string' && val.trim());
        if (!hasContent) {
          if (!isAutoSave) {
            setSaveStatus('Enter some content before saving');
            setTimeout(() => setSaveStatus(''), 3000);
          }
          return;
        }

        try {
          const entryWithConfig = {
            data: entry,
            fieldConfig: fieldConfig,
            savedAt: new Date().toISOString()
          };
          await window.storage.set(`journal:${currentDate}`, JSON.stringify(entryWithConfig));
          if (isAutoSave) {
            setSaveStatus('Auto-saved');
            setTimeout(() => setSaveStatus(''), 2000);
          } else {
            setSaveStatus('Saved!');
            setTimeout(() => setSaveStatus(''), 3000);
          }
          // Only refresh the date list, don't re-fetch all entry content
          refreshDateList();
        } catch (error) {
          if (!isAutoSave) {
            setSaveStatus('Error saving');
            setTimeout(() => setSaveStatus(''), 3000);
          }
        }
      };

      // ─── Navigation ───
      const loadEntry = (date) => {
        setCurrentDate(date);
        setShowSidebar(false);
      };

      const navigateDate = (direction) => {
        const d = new Date(currentDate + 'T00:00:00');
        d.setDate(d.getDate() + (direction === 'next' ? 1 : -1));
        setCurrentDate(d.toISOString().split('T')[0]);
      };

      // ─── Export TXT ───
      const exportToTXT = () => {
        const currentEntryData = entries[currentDate];
        const entry = currentEntryData?.data || currentEntryData;
        if (!entry) return;

        const displayConfig = entries[currentDate]?.fieldConfig || fieldConfig;
        let content = `LIFE JOURNAL — ${currentDate}\n${'═'.repeat(50)}\n\n`;

        sections.forEach(section => {
          const sectionFields = displayConfig.filter(f => f.section === section.id && !f.parent);
          const hasContent = sectionFields.some(f => entry[f.id]?.trim());
          if (!hasContent) return;

          content += `── ${section.label.toUpperCase()} ──\n\n`;
          sectionFields.forEach(field => {
            const val = entry[field.id] || '';
            if (val.trim()) {
              content += `${field.label}: ${val}\n`;
              // Include sub-fields
              const subs = displayConfig.filter(f => f.parent === field.id);
              subs.forEach(sub => {
                const subVal = entry[sub.id] || '';
                if (subVal.trim()) content += `  ${sub.label}: ${subVal}\n`;
              });
              content += '\n';
            }
          });
        });

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `journal-${currentDate}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── Export PDF (via print dialog, with HTML-escaped content) ───
      const exportToPDF = () => {
        const currentEntryData = entries[currentDate];
        const entry = currentEntryData?.data || currentEntryData;
        if (!entry) return;

        const displayConfig = entries[currentDate]?.fieldConfig || fieldConfig;

        const sectionAccents = {
          blue: { heading: '#2c5ea8', border: '#2c5ea8', stripe: '#eef3fc' },
          purple: { heading: '#6b4fad', border: '#6b4fad', stripe: '#f3eefc' },
          green: { heading: '#1d7a4a', border: '#1d7a4a', stripe: '#ecf7f0' },
          yellow: { heading: '#8a6d10', border: '#8a6d10', stripe: '#fdf8ea' },
          red: { heading: '#b83232', border: '#b83232', stripe: '#fceded' },
          pink: { heading: '#a83c6e', border: '#a83c6e', stripe: '#fceef4' }
        };

        let html = `<!DOCTYPE html><html><head>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
        <style>
          @page { margin: 18mm 16mm; size: letter; }
          * { box-sizing: border-box; margin: 0; padding: 0; }
          body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            color: #1a1a2e;
            font-size: 13px;
            line-height: 1.5;
          }
          .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 2px solid #1a1a2e;
          }
          .header h1 {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            color: #1a1a2e;
            margin-bottom: 2px;
          }
          .header .date {
            font-size: 14px;
            font-weight: 500;
            color: #555;
            letter-spacing: 0.5px;
          }
          .section {
            border-left: 4px solid #ccc;
            padding: 14px 18px;
            margin-bottom: 18px;
            page-break-inside: avoid;
            background: #fff;
          }
          .section h2 {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e0e0e0;
          }
          .field { margin-bottom: 10px; }
          .field-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #777;
            margin-bottom: 2px;
          }
          .field-value {
            font-size: 13px;
            line-height: 1.6;
            color: #1a1a2e;
            white-space: pre-wrap;
            padding: 6px 10px;
            border-radius: 4px;
          }
          .sub-fields {
            margin: 4px 0 0 14px;
            padding-left: 10px;
            border-left: 2px solid #d8d0f0;
          }
          .sub-field { margin-bottom: 6px; }
          .sub-field .field-label { font-size: 9px; }
          .sub-field .field-value { font-size: 12px; padding: 4px 8px; }
          .side-by-side {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
          }
          .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 12px;
            border-top: 1px solid #ddd;
            font-size: 10px;
            color: #999;
          }
        </style></head><body>`;

        html += `<div class="header"><h1>Life Journal</h1><div class="date">${escapeHtml(currentDate)}</div></div>`;

        sections.forEach(section => {
          const sectionFields = displayConfig.filter(f => f.section === section.id && !f.parent);
          const hasContent = sectionFields.some(f => entry[f.id]?.trim());
          if (!hasContent) return;

          const accent = sectionAccents[section.color] || sectionAccents.blue;
          html += `<div class="section" style="border-left-color:${accent.border};">`;
          html += `<h2 style="color:${accent.heading};border-bottom-color:${accent.border}20;">${escapeHtml(section.label)}</h2>`;

          sectionFields.forEach((field, index) => {
            if (field.sideBySide) return;
            const value = entry[field.id] || '';
            const nextField = sectionFields[index + 1];
            const isSideBySidePair = nextField?.sideBySide;
            const subFields = displayConfig.filter(f => f.parent === field.id);

            if (isSideBySidePair && nextField) {
              const nextValue = entry[nextField.id] || '';
              if (value.trim() || nextValue.trim()) {
                html += `<div class="side-by-side">`;
                html += `<div class="field"><div class="field-label">${escapeHtml(field.label)}</div><div class="field-value" style="background:${accent.stripe};">${escapeHtml(value).replace(/\n/g, '<br>') || '—'}</div></div>`;
                html += `<div class="field"><div class="field-label">${escapeHtml(nextField.label)}</div><div class="field-value" style="background:${accent.stripe};">${escapeHtml(nextValue).replace(/\n/g, '<br>') || '—'}</div></div>`;
                html += `</div>`;
              }
            } else if (value.trim()) {
              html += `<div class="field"><div class="field-label">${escapeHtml(field.label)}</div><div class="field-value" style="background:${accent.stripe};">${escapeHtml(value).replace(/\n/g, '<br>')}</div></div>`;
              if (subFields.length > 0) {
                html += `<div class="sub-fields">`;
                subFields.forEach(sub => {
                  const subVal = entry[sub.id] || '';
                  if (subVal.trim()) {
                    html += `<div class="sub-field"><div class="field-label">${escapeHtml(sub.label)}</div><div class="field-value" style="background:${accent.stripe};">${escapeHtml(subVal).replace(/\n/g, '<br>')}</div></div>`;
                  }
                });
                html += `</div>`;
              }
            }
          });

          html += `</div>`;
        });

        html += `<div class="footer">Life Journal &mdash; ${escapeHtml(currentDate)}</div>`;
        html += '</body></html>';

        const printWindow = window.open('', '', 'height=700,width=850');
        if (printWindow) {
          printWindow.document.write(html);
          printWindow.document.close();
          printWindow.onload = () => printWindow.print();
        }
      };

      // ─── Mass Export: JSON backup ───
      const exportAllJSON = () => {
        const backup = {
          exportedAt: new Date().toISOString(),
          version: '1.0',
          entryCount: Object.keys(entries).length,
          entries: entries
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `life-journal-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── Mass Export: single combined TXT ───
      const exportAllTXTCombined = () => {
        const sortedDates = Object.keys(entries).sort();
        let content = `LIFE JOURNAL — COMPLETE EXPORT\nExported: ${new Date().toISOString().split('T')[0]}\nEntries: ${sortedDates.length}\n${'═'.repeat(50)}\n\n`;

        sortedDates.forEach(date => {
          const entryData = entries[date];
          const entry = entryData?.data || entryData;
          const config = entryData?.fieldConfig || fieldConfig;
          if (!entry) return;

          content += `\n${'─'.repeat(50)}\n  ${date}\n${'─'.repeat(50)}\n\n`;

          sections.forEach(section => {
            const sectionFields = config.filter(f => f.section === section.id && !f.parent);
            const hasContent = sectionFields.some(f => entry[f.id]?.trim());
            if (!hasContent) return;

            content += `── ${section.label.toUpperCase()} ──\n\n`;
            sectionFields.forEach(field => {
              const val = entry[field.id] || '';
              if (val.trim()) {
                content += `${field.label}: ${val}\n`;
                const subs = config.filter(f => f.parent === field.id);
                subs.forEach(sub => {
                  const subVal = entry[sub.id] || '';
                  if (subVal.trim()) content += `  ${sub.label}: ${subVal}\n`;
                });
                content += '\n';
              }
            });
          });
        });

        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `life-journal-all-${new Date().toISOString().split('T')[0]}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      // ─── Mass Export: individual TXT files (uses a delay loop to trigger downloads) ───
      const exportAllTXTIndividual = () => {
        const sortedDates = Object.keys(entries).sort();

        sortedDates.forEach((date, i) => {
          setTimeout(() => {
            const entryData = entries[date];
            const entry = entryData?.data || entryData;
            const config = entryData?.fieldConfig || fieldConfig;
            if (!entry) return;

            let content = `LIFE JOURNAL — ${date}\n${'═'.repeat(50)}\n\n`;
            sections.forEach(section => {
              const sectionFields = config.filter(f => f.section === section.id && !f.parent);
              const hasContent = sectionFields.some(f => entry[f.id]?.trim());
              if (!hasContent) return;
              content += `── ${section.label.toUpperCase()} ──\n\n`;
              sectionFields.forEach(field => {
                const val = entry[field.id] || '';
                if (val.trim()) {
                  content += `${field.label}: ${val}\n`;
                  const subs = config.filter(f => f.parent === field.id);
                  subs.forEach(sub => {
                    const subVal = entry[sub.id] || '';
                    if (subVal.trim()) content += `  ${sub.label}: ${subVal}\n`;
                  });
                  content += '\n';
                }
              });
            });

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `journal-${date}.txt`;
            a.click();
            URL.revokeObjectURL(url);
          }, i * 100); // Stagger downloads to avoid browser blocking
        });
      };

      // ─── Import JSON backup ───
      const importJSON = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const text = await file.text();
            const backup = JSON.parse(text);

            // Validate structure
            if (!backup.entries || typeof backup.entries !== 'object') {
              setSaveStatus('Invalid backup file — no entries found');
              setTimeout(() => setSaveStatus(''), 4000);
              return;
            }

            const dates = Object.keys(backup.entries);
            let imported = 0;
            let skipped = 0;

            for (const date of dates) {
              const entryData = backup.entries[date];
              // Skip if entry already exists for this date
              if (entries[date]) {
                skipped++;
                continue;
              }
              try {
                await window.storage.set(`journal:${date}`, JSON.stringify(entryData));
                imported++;
              } catch {
                // Skip failed entries
              }
            }

            setSaveStatus(`Imported ${imported} entries` + (skipped > 0 ? `, skipped ${skipped} (already exist)` : ''));
            setTimeout(() => setSaveStatus(''), 5000);
            loadAllEntries();
            setShowExportModal(false);
          } catch (err) {
            setSaveStatus('Error reading backup file');
            setTimeout(() => setSaveStatus(''), 4000);
          }
        };
        input.click();
      };

      // ─── Delete entry ───
      const deleteEntry = async () => {
        try {
          await window.storage.delete(`journal:${currentDate}`);
          setEntries(prev => {
            const updated = { ...prev };
            delete updated[currentDate];
            return updated;
          });
          setSaveStatus('Entry deleted');
          setTimeout(() => setSaveStatus(''), 3000);
          setShowDeleteConfirm(false);
          refreshDateList();

          const remaining = savedDates.filter(d => d !== currentDate);
          if (remaining.length > 0) {
            setCurrentDate(remaining[0]);
          } else {
            setCurrentDate(new Date().toISOString().split('T')[0]);
          }
        } catch (error) {
          setShowDeleteConfirm(false);
          if (error.message && error.message.includes('401')) {
            window.location.reload(); // Session expired, force re-login
          } else {
            setSaveStatus('Error deleting — entry may not be saved yet');
            setTimeout(() => setSaveStatus(''), 4000);
          }
        }
      };

      // ─── Computed values ───
      const availableYears = [...new Set(savedDates.map(d => d.substring(0, 4)))].sort().reverse();
      const filteredDates = savedDates
        .filter(d => d.startsWith(selectedYear))
        .sort((a, b) => sortOrder === 'desc' ? b.localeCompare(a) : a.localeCompare(b));

      const currentEntry = entries[currentDate]?.data || entries[currentDate] || {};
      const displayFieldConfig = entries[currentDate]?.fieldConfig || fieldConfig;

      // ═══════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════
      if (isLoading) {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)', color: 'var(--text-secondary)' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '32px', fontFamily: "'DM Serif Display', Georgia, serif", marginBottom: '8px', color: 'var(--text-primary)' }}>Life Journal</div>
              <div>Loading entries...</div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', background: 'var(--bg-primary)', color: 'var(--text-primary)' }}>

          {/* ─── Delete Confirmation Modal ─── */}
          {showDeleteConfirm && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
              <div style={{ background: 'var(--bg-card)', borderRadius: '12px', padding: '24px', maxWidth: '420px', width: '90%', border: '1px solid var(--border-subtle)' }}>
                <h2 style={{ margin: '0 0 12px', color: 'var(--accent-red)', fontSize: '20px', fontFamily: "'DM Serif Display', Georgia, serif" }}>Delete Entry?</h2>
                <p style={{ color: 'var(--text-secondary)', marginBottom: '24px', lineHeight: 1.5 }}>
                  Delete the entry for <strong style={{ color: 'var(--text-primary)' }}>{currentDate}</strong>? This can't be undone.
                </p>
                <div style={{ display: 'flex', gap: '12px', justifyContent: 'flex-end' }}>
                  <button onClick={() => setShowDeleteConfirm(false)} style={{ background: 'var(--bg-input)', color: 'var(--text-primary)', border: '1px solid var(--border-subtle)', padding: '8px 16px', borderRadius: '8px', cursor: 'pointer' }}>Cancel</button>
                  <button onClick={deleteEntry} style={{ background: 'var(--accent-red)', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '8px', cursor: 'pointer' }}>Yes, Delete</button>
                </div>
              </div>
            </div>
          )}

          {/* ─── Settings Modal (FIXED: now properly conditional) ─── */}
          {showSettings && (
            <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 9999 }}>
              <div style={{ background: 'var(--bg-card)', borderRadius: '12px', padding: '24px', maxWidth: '900px', width: '95%', maxHeight: '90vh', overflowY: 'auto', border: '1px solid var(--border-subtle)' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', position: 'sticky', top: 0, background: 'var(--bg-card)', paddingBottom: '16px', borderBottom: '1px solid var(--border-subtle)' }}>
                  <h2 style={{ margin: 0, fontFamily: "'DM Serif Display', Georgia, serif", fontSize: '24px', color: 'var(--accent-blue)' }}>Settings</h2>
                  <button onClick={() => setShowSettings(false)} style={{ background: 'none', border: 'none', color: 'var(--text-secondary)', cursor: 'pointer', padding: '4px' }}><XIcon size={24} /></button>
                </div>

                {/* General Settings */}
                <div style={{ marginBottom: '32px' }}>
                  <h3 style={{ color: 'var(--accent-purple)', marginBottom: '12px', fontSize: '16px', fontWeight: 600 }}>General</h3>
                  <label style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer' }}>
                    <input type="checkbox" checked={settings.openToYesterday} onChange={(e) => saveSettings({ ...settings, openToYesterday: e.target.checked })} style={{ width: '18px', height: '18px', accentColor: 'var(--accent-blue)' }} />
                    <span>Open to yesterday's date by default</span>
                  </label>
                </div>

                {/* Manage Fields */}
                <div style={{ marginBottom: '32px' }}>
                  <h3 style={{ color: 'var(--accent-green)', marginBottom: '12px', fontSize: '16px', fontWeight: 600 }}>Manage Fields</h3>

                  {/* Add New Field */}
                  <div style={{ background: 'var(--bg-input)', borderRadius: '8px', padding: '16px', marginBottom: '16px' }}>
                    <h4 style={{ margin: '0 0 12px', fontSize: '14px', fontWeight: 600 }}>Add New Field</h4>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                      <input type="text" placeholder="Field name" value={newFieldName} onChange={(e) => setNewFieldName(e.target.value)}
                        style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '6px', padding: '8px 12px', color: 'var(--text-primary)', outline: 'none' }} />
                      <select value={newFieldSection} onChange={(e) => setNewFieldSection(e.target.value)}
                        style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '6px', padding: '8px 12px', color: 'var(--text-primary)' }}>
                        {sections.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                      </select>
                      <select value={newFieldRows} onChange={(e) => setNewFieldRows(parseInt(e.target.value))}
                        style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '6px', padding: '8px 12px', color: 'var(--text-primary)' }}>
                        {[1,2,3,4,5].map(n => <option key={n} value={n}>Start with {n} row{n > 1 ? 's' : ''}</option>)}
                      </select>
                      <select value={newFieldParent} onChange={(e) => setNewFieldParent(e.target.value)}
                        style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '6px', padding: '8px 12px', color: 'var(--text-primary)' }}>
                        <option value="">No parent (top-level)</option>
                        {fieldConfig.filter(f => f.section === newFieldSection && !f.parent).map(f =>
                          <option key={f.id} value={f.id}>Sub-field of: {f.label}</option>
                        )}
                      </select>
                    </div>
                    <label style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px', fontSize: '14px' }}>
                      <input type="checkbox" checked={newFieldSideBySide} onChange={(e) => setNewFieldSideBySide(e.target.checked)} />
                      <span>Place side-by-side with previous field</span>
                    </label>
                    <button onClick={addNewField}
                      style={{ marginTop: '12px', background: 'var(--accent-blue)', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '6px', cursor: 'pointer', fontWeight: 500 }}>
                      Add Field
                    </button>
                  </div>

                  {/* Field List */}
                  {sections.map(section => {
                    const sectionFields = fieldConfig.filter(f => f.section === section.id && !f.parent);
                    if (sectionFields.length === 0) return null;
                    return (
                      <div key={section.id} style={{ marginBottom: '16px' }}>
                        <h4 style={{ fontSize: '13px', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '1px', margin: '0 0 8px' }}>{section.label}</h4>
                        {sectionFields.map((field, fieldIdx) => {
                          // Check if this field CAN be side-by-side
                          const isFirstInSection = fieldIdx === 0;
                          const prevField = fieldIdx > 0 ? sectionFields[fieldIdx - 1] : null;
                          const prevIsSideBySide = prevField?.sideBySide;
                          const canBeSideBySide = !isFirstInSection && !prevIsSideBySide;
                          const subFields = fieldConfig.filter(f => f.parent === field.id);

                          return (
                          <React.Fragment key={field.id}>
                          <div
                            draggable
                            onDragStart={() => handleDragStart(field.id)}
                            onDragOver={handleDragOver}
                            onDrop={() => handleDrop(field.id)}
                            style={{
                              background: 'var(--bg-input)', borderRadius: '6px', padding: '10px 12px', marginBottom: '4px',
                              display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'grab',
                              transition: 'background 0.15s',
                              border: field.sideBySide ? '1px solid var(--accent-blue)' : '1px solid transparent',
                              marginLeft: field.sideBySide ? '20px' : '0'
                            }}
                            onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-secondary)'}
                            onMouseLeave={e => e.currentTarget.style.background = 'var(--bg-input)'}
                          >
                            <div style={{ flex: 1 }}>
                              {editingField === field.id ? (
                                <input type="text" defaultValue={field.label} autoFocus
                                  onBlur={(e) => saveFieldEdit(field.id, e.target.value)}
                                  onKeyDown={(e) => e.key === 'Enter' && saveFieldEdit(field.id, e.target.value)}
                                  style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-focus)', borderRadius: '4px', padding: '4px 8px', width: '100%', color: 'var(--text-primary)', outline: 'none' }} />
                              ) : (
                                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                  <span style={{ fontWeight: 500 }}>{field.label}</span>
                                  <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>
                                    ({field.rows}r)
                                  </span>
                                  {field.sideBySide && prevField && (
                                    <span style={{ fontSize: '11px', color: 'var(--accent-blue)', background: 'rgba(91,138,245,0.15)', padding: '1px 6px', borderRadius: '4px' }}>
                                      paired with {prevField.label}
                                    </span>
                                  )}
                                  {subFields.length > 0 && (
                                    <span style={{ fontSize: '11px', color: 'var(--accent-purple)', background: 'rgba(167,139,250,0.15)', padding: '1px 6px', borderRadius: '4px' }}>
                                      {subFields.length} sub-field{subFields.length > 1 ? 's' : ''}
                                    </span>
                                  )}
                                </div>
                              )}
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginLeft: '12px' }}>
                              <select value={field.rows || 1} onChange={(e) => updateFieldRows(field.id, parseInt(e.target.value))} onClick={e => e.stopPropagation()}
                                style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '4px', padding: '2px 4px', fontSize: '12px', color: 'var(--text-primary)' }}>
                                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n}</option>)}
                              </select>
                              <button onClick={() => canBeSideBySide || field.sideBySide ? toggleSideBySide(field.id) : null}
                                title={field.sideBySide ? 'Remove side-by-side pairing' : isFirstInSection ? 'Cannot pair — first field in section' : prevIsSideBySide ? 'Cannot pair — field above is already paired' : 'Pair side-by-side with field above'}
                                style={{ background: 'none', border: 'none', cursor: canBeSideBySide || field.sideBySide ? 'pointer' : 'not-allowed', fontSize: '16px', color: field.sideBySide ? 'var(--accent-blue)' : (!canBeSideBySide ? 'var(--bg-secondary)' : 'var(--text-muted)'), padding: '2px 4px', opacity: canBeSideBySide || field.sideBySide ? 1 : 0.4 }}>⇆</button>
                              <button onClick={() => setEditingField(field.id)} title="Rename"
                                style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px', padding: '2px 4px' }}>✏️</button>
                              <button onClick={() => removeField(field.id)} title="Delete"
                                style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '14px', padding: '2px 4px' }}>🗑️</button>
                            </div>
                          </div>
                          {/* Sub-fields listed under their parent */}
                          {subFields.map(sub => (
                            <div key={sub.id}
                              style={{
                                background: 'var(--bg-input)', borderRadius: '6px', padding: '8px 12px', marginBottom: '4px',
                                display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                                marginLeft: '28px', borderLeft: '2px solid var(--accent-purple)',
                                transition: 'background 0.15s'
                              }}
                              onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-secondary)'}
                              onMouseLeave={e => e.currentTarget.style.background = 'var(--bg-input)'}
                            >
                              <div style={{ flex: 1 }}>
                                {editingField === sub.id ? (
                                  <input type="text" defaultValue={sub.label} autoFocus
                                    onBlur={(e) => saveFieldEdit(sub.id, e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && saveFieldEdit(sub.id, e.target.value)}
                                    style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-focus)', borderRadius: '4px', padding: '4px 8px', width: '100%', color: 'var(--text-primary)', outline: 'none' }} />
                                ) : (
                                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                    <span style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>↳</span>
                                    <span style={{ fontWeight: 500, fontSize: '14px' }}>{sub.label}</span>
                                    <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>({sub.rows}r, sub-field of {field.label})</span>
                                  </div>
                                )}
                              </div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginLeft: '12px' }}>
                                <select value={sub.rows || 1} onChange={(e) => updateFieldRows(sub.id, parseInt(e.target.value))} onClick={e => e.stopPropagation()}
                                  style={{ background: 'var(--bg-secondary)', border: '1px solid var(--border-subtle)', borderRadius: '4px', padding: '2px 4px', fontSize: '12px', color: 'var(--text-primary)' }}>

                  const colors = SECTION_COLORS[section.color] || SECTION_COLORS.blue;

                  return (

                          const nextField = sectionFields[index + 1];
                          const isSideBySidePair = nextField?.sideBySide;
                          const subFields = displayFieldConfig.filter(f => f.parent === field.id);

                          const textareaStyle = {

                                    rows={field.rows || 1}
                                    style={textareaStyle}
                                  />

                                            value={currentEntry[sub.id] || ''}
                                            onChange={(e) => { updateField(sub.id, e.target.value); handleTextareaInput(e); }}

                                            onFocus={(e) => e.target.style.borderColor = 'var(--border-focus)'}
                                            onBlur={(e) => e.target.style.borderColor = 'var(--border-subtle)'}
                                            rows={sub.rows || 1}
                                            style={{ ...textareaStyle, fontSize: '13px' }}
                                          />
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>

    // ─── Setup Screen (first run — create password) ───
    function SetupScreen({ onComplete }) {
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async () => {
        setError('');
        if (password.length < 6) {
          return setError('Password must be at least 6 characters');
        }
        if (password !== confirm) {
          return setError('Passwords do not match');
        }
        setLoading(true);
        try {
          const res = await fetch('/api/setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            onComplete();
          } else {
            setError(data.error || 'Setup failed');
          }
        } catch {
          setError('Connection error');
        }
        setLoading(false);
      };

      const inputStyle = { width: '100%', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: '8px', padding: '12px 16px', color: 'var(--text-primary)', outline: 'none', fontSize: '15px', marginBottom: '12px', boxSizing: 'border-box' };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)' }}>
          <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: '16px', padding: '40px', width: '100%', maxWidth: '400px', margin: '16px' }}>
            <h1 style={{ margin: '0 0 4px', fontFamily: "'DM Serif Display', Georgia, serif", fontSize: '28px', color: 'var(--text-primary)', textAlign: 'center' }}>Life Journal</h1>
            <p style={{ margin: '0 0 8px', color: 'var(--accent-green)', textAlign: 'center', fontSize: '14px', fontWeight: 500 }}>Welcome — let's secure your journal</p>
            <p style={{ margin: '0 0 24px', color: 'var(--text-muted)', textAlign: 'center', fontSize: '13px', lineHeight: 1.5 }}>Create a password to protect your entries. You'll need this every time you sign in.</p>
            <div>
              <input
                type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                placeholder="Create password (6+ characters)" autoFocus
                onKeyDown={(e) => e.key === 'Enter' && document.getElementById('confirm-pw').focus()}
                style={inputStyle}
              />
              <input
                type="password" id="confirm-pw" value={confirm} onChange={(e) => setConfirm(e.target.value)}
                placeholder="Confirm password"
                onKeyDown={(e) => e.key === 'Enter' && handleSubmit()}
                style={inputStyle}
              />
              {error && <p style={{ color: 'var(--accent-red)', fontSize: '13px', margin: '0 0 12px' }}>{error}</p>}
              <button
                onClick={handleSubmit} disabled={loading}
                style={{ width: '100%', background: 'var(--accent-blue)', color: 'white', border: 'none', padding: '12px', borderRadius: '8px', cursor: loading ? 'wait' : 'pointer', fontWeight: 600, fontSize: '15px' }}
              >
                {loading ? 'Setting up...' : 'Create Password & Start'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Login Screen ───
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        if (e) e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            onLogin();
          } else {
            setError(data.error || 'Login failed');
          }
        } catch {
          setError('Connection error');
        }
        setLoading(false);
      };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)' }}>
          <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border-subtle)', borderRadius: '16px', padding: '40px', width: '100%', maxWidth: '380px', margin: '16px' }}>
            <h1 style={{ margin: '0 0 8px', fontFamily: "'DM Serif Display', Georgia, serif", fontSize: '28px', color: 'var(--text-primary)', textAlign: 'center' }}>Life Journal</h1>
            <p style={{ margin: '0 0 24px', color: 'var(--text-muted)', textAlign: 'center', fontSize: '14px' }}>Enter your password to continue</p>
            <div>
              <input
                type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && handleSubmit(e)}
                placeholder="Password" autoFocus
                style={{ width: '100%', background: 'var(--bg-input)', border: '1px solid var(--border-subtle)', borderRadius: '8px', padding: '12px 16px', color: 'var(--text-primary)', outline: 'none', fontSize: '15px', marginBottom: '12px', boxSizing: 'border-box' }}
              />
              {error && <p style={{ color: 'var(--accent-red)', fontSize: '13px', margin: '0 0 12px' }}>{error}</p>}
              <button
                onClick={handleSubmit} disabled={loading}
                style={{ width: '100%', background: 'var(--accent-blue)', color: 'white', border: 'none', padding: '12px', borderRadius: '8px', cursor: loading ? 'wait' : 'pointer', fontWeight: 600, fontSize: '15px' }}
              >
                {loading ? 'Signing in...' : 'Sign In'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── App wrapper ───
    function App() {
      const [authState, setAuthState] = useState('checking'); // checking | setup | login | authenticated

      useEffect(() => {
        fetch('/api/auth-status')
          .then(r => r.json())
          .then(data => {
            if (data.authenticated) {
              setAuthState('authenticated');
            } else if (!data.setupComplete) {
              setAuthState('setup');
            } else {
              setAuthState('login');
            }
          })
          .catch(() => setAuthState('setup'));
      }, []);

      if (authState === 'checking') {
        return (
          <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--bg-primary)', color: 'var(--text-secondary)' }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: '32px', fontFamily: "'DM Serif Display', Georgia, serif", marginBottom: '8px', color: 'var(--text-primary)' }}>Life Journal</div>
              <div>Loading...</div>
            </div>
          </div>
        );
      }

      if (authState === 'setup') {
        return <SetupScreen onComplete={() => setAuthState('authenticated')} />;
      }

      if (authState === 'login') {
        return <LoginScreen onLogin={() => setAuthState('authenticated')} />;
      }

      return <LifeJournal />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
